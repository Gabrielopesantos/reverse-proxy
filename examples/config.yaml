server:
  address: :8080
  read_timeout: 10

routes:
  /first:
    upstreams:
      - "http://localhost:8081"
      - "http://localhost:8082"
      - "http://localhost:8084"
    lb_policy: "round_robin"
    healthcheck_interval_seconds: 5
    middleware:
      - logger:
          stream: first-route.log
          mode: text
      - rate_limiter:
          max_requests: 4
          time_frame_seconds: 30

  /second:
    upstreams: ["http://127.0.0.1:8083", "http://127.0.0.1:8085"]
    healthcheck_interval_seconds: 10
    middleware:
      - rate_limiter:
          max_requests: 2
          time_frame_seconds: 60
      - basic_auth:
          file: ./examples/basic_auth
      - cache_control:
          duration: 30s
      - logger:
          stream: stdout
          mode: text
